[pytest]
# Test discovery: look for files matching test_*.py
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for grouping tests
markers =
    smoke: Quick sanity checks
    functional: Detailed feature tests
    regression: Full regression suite

# Default options: verbose output, short traceback, show local vars on failure
addopts = -v --tb=short -l
